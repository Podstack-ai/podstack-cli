name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./...
      - run: go test ./... -race -count=1
      # golangci-lint is temporarily disabled until a release is published
      # that supports the Go 1.25 toolchain referenced in go.mod.
