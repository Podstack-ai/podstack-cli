version: 2

project_name: podstack

before:
  hooks:
    - go mod tidy

builds:
  - id: podstack
    main: ./
    binary: podstack
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/Podstack-ai/podstack-cli/cmd.version={{.Version}}

archives:
  - id: default
    builds: [podstack]
    name_template: "podstack_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: Podstack-ai
    name: podstack-cli
  extra_files:
    - glob: ./scripts/install.sh
