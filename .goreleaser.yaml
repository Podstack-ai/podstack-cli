version: 2

project_name: podstack

before:
  hooks:
    - go mod tidy

builds:
  - id: podstack
    main: ./
    binary: podstack
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/podstack/podstack-cli/cmd.version={{.Version}}

archives:
  - id: default
    builds: [podstack]
    name_template: "podstack_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: podstack
    repository:
      owner: podstack
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/podstack/podstack-cli"
    description: "Send and receive large files using croc, defaulting to the Podstack relay"
    license: MIT
    install: |
      bin.install "podstack"
    test: |
      system "#{bin}/podstack", "version"
